<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generated MCQs</title>
    <link rel="icon" href="static/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #000000, #0a0a14, #1a1a24, #0a0a14, #000000);
            background-size: 400% 400%;
            animation: darkFlow 12s ease-in-out infinite;
            color: #ffffff;
        }
        @keyframes darkFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h2 { font-weight: 700; margin-bottom: 25px; }
        .result-box {
            background: rgba(10,10,18,0.85);
            border-radius: 14px;
            padding: 35px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.55);
            max-width: 1100px;
            margin: auto;
            margin-bottom: 30px;
        }
        .nice-btn {
            background: linear-gradient(135deg, #d9d9d9, #f2f2f2);
            border: none;
            color: #000;
            font-weight: 600;
            padding: 12px 22px;
            margin: 0 5px;
            border-radius: 10px;
            transition: 0.25s ease;
            text-decoration: none !important;
            display: inline-block;
        }
        .nice-btn:hover {
            background: linear-gradient(135deg, #e3e3e3, #ffffff);
            box-shadow: 0 0 12px rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }
        .reveal-btn {
            margin-top: 12px;
            background: linear-gradient(135deg, #d9d9d9, #f7f7f7);
            border: none;
            color: #000;
            font-weight: 600;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.25s ease;
        }
        .reveal-btn:hover { transform: scale(1.03); }
        .answer-box {
            display: none;
            margin-top: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            border-left: 3px solid rgba(255,255,255,0.5);
        }
        .mapped-question {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid #6c63ff;
        }
        .mapped-question strong { color: #d9d9ff; }
        .bloom-badge, .similarity-score {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }
        .bloom-Remember { background: #ff6b6b; }
        .bloom-Understand { background: #4ecdc4; }
        .bloom-Apply { background: #45b7d1; }
        .bloom-Analyze { background: #f9ca24; color: #000; }
        .bloom-Evaluate { background: #6c5ce7; }
        .bloom-Create { background: #a29bfe; }
        .bloom-Unclassified { background: #95a5a6; }
        .score-high { background: #2ecc71; }
        .score-medium { background: #f39c12; }
        .score-low { background: #e74c3c; }
        .question-title { font-weight: 700; font-size: 20px; margin-bottom: 14px; color: #cfd0ff; }
        hr { border-color: rgba(255,255,255,0.15); margin-top: 18px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center">Generated MCQs</h2>

    <div class="text-center mb-4" id="downloadBtns"></div>
    <div class="result-box" id="mcqBox"></div>
    <div class="result-box" id="mappingBox"></div>

    <div class="text-center mt-3">
        <a href="index.html" class="nice-btn">Generate More MCQs</a>
    </div>
</div>

<script>
    const BACKEND_URL = "https://ai-powered-question-paper-generator-with-olyu.onrender.com";

    function revealAnswer(id) {
        const box = document.getElementById(id);
        box.style.display = box.style.display === "none" ? "block" : "none";
    }

    function scoreClass(score) {
        if (score >= 0.7) return "score-high";
        if (score >= 0.5) return "score-medium";
        return "score-low";
    }

    function renderMCQs(mcqsRaw, txtFilename, pdfFilename, jsonFilename, docxFilename) {
        // Download buttons
        const dlDiv = document.getElementById("downloadBtns");
       dlDiv.innerHTML = `
            <a class="nice-btn" href="${BACKEND_URL}/download/${txtFilename}">Download .TXT</a>
            <a class="nice-btn" href="${BACKEND_URL}/download/${pdfFilename}">Download .PDF</a>
            <a class="nice-btn" href="${BACKEND_URL}/download/${jsonFilename}">Download CO JSON</a>
            <a class="nice-btn" href="${BACKEND_URL}/download/${docxFilename}">Download .DOCX</a>
            `;

        // MCQ blocks
        const mcqBox = document.getElementById("mcqBox");
        const blocks = mcqsRaw.split("\n\n").filter(b => b.includes("Correct Answer:"));
        let html = "<h2>All MCQs</h2>";
        let answers = [];

        blocks.forEach((block, i) => {
            const lines = block.split("\n").map(l => l.trim()).filter(Boolean);
            let answerLine = "";
            let contentLines = [];

            lines.forEach(line => {
                if (line.startsWith("Correct Answer:")) {
                    answerLine = line;
                    const match = line.match(/Correct Answer:\s*([A-D])/i);
                    if (match) answers.push(match[1]);
                }
                else if (line && !/^\d+$/.test(line)) contentLines.push(line);
            });

            html += `
                <div class="mapped-question">
                    <h3>MCQ ${i + 1}</h3>
                    ${contentLines.map(l => `<div style="margin-bottom:6px;">${l}</div>`).join("")}
                    ${i < blocks.length - 1 ? "<hr>" : ""}
                </div>`;
        });

        // Add answers section at the end
        html += `
            <div class="mapped-question" style="border-left: 4px solid #2ecc71; margin-top: 30px;">
                <h3 style="color: #2ecc71;">ANSWERS</h3>
                <div style="font-family: monospace; font-size: 14px; line-height: 1.8;">`;
        
        answers.forEach((ans, i) => {
            html += `<div>Answer_${i + 1}:${ans}</div>`;
        });
        
        html += `</div></div>`;

        mcqBox.innerHTML = html;
    }

    function renderMapping(mappedMcqs) {
        const mappingBox = document.getElementById("mappingBox");
        let html = "<h2>CO Mapping Results</h2>";

        mappedMcqs.forEach((mcq, i) => {
            html += `
                <div class="mapped-question">
                    <h3>Question ${i + 1}</h3>
                    <p><strong>Question:</strong> ${mcq.question_text}</p>
                    <p><strong>Mapped to:</strong> ${mcq.mapped_co} - ${mcq.co_description}</p>
                    <p><strong>Bloom Level:</strong>
                        <span class="bloom-badge bloom-${mcq.bloom_level}">${mcq.bloom_level}</span>
                    </p>
                    <p><strong>Similarity Score:</strong>
                        <span class="similarity-score ${scoreClass(mcq.similarity_score)}">
                            ${mcq.similarity_score.toFixed(4)}
                        </span>
                    </p>
                    ${i < mappedMcqs.length - 1 ? "<hr>" : ""}
                </div>`;
        });

        mappingBox.innerHTML = html;
    }

    // Load data from sessionStorage
    const raw = sessionStorage.getItem("mcqResult");
    if (!raw) {
        window.location.href = "index.html";
    } else {
        const data = JSON.parse(raw);
        renderMCQs(data.mcqs_raw, data.txt_filename, data.pdf_filename, data.json_filename, data.docx_filename);
        if (data.mapped_mcqs && data.mapped_mcqs.length > 0) {
            renderMapping(data.mapped_mcqs);
        }
        sessionStorage.removeItem("mcqResult");
    }
</script>
</body>
</html>
