<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MCQ Quiz Generator</title>
    <link rel="icon" href="static/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #000000, #0a0a14, #1a1a24, #0a0a14, #000000);
            background-size: 400% 400%;
            animation: darkFlow 12s ease-in-out infinite;
            color: #ffffff;
        }
        @keyframes darkFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h2 { font-weight: 700; letter-spacing: 1px; }
        .form-box {
            background: rgba(10,10,18,0.85);
            border-radius: 14px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.55);
            max-width: 1000px;
            margin: auto;
        }
        .form-control {
            background-color: #1a1c25;
            border: 1px solid #333647;
            color: #e0e0e0;
        }
        .form-control:focus {
            background-color: #1e202a;
            border-color: #9192a3;
            box-shadow: 0 0 8px rgba(100,108,255,0.5);
            color: #fff;
        }
        .form-control::placeholder { color: #b7b7c9 !important; }
        .form-label { color: #dcdcdc; font-weight: 500; }
        .btn-generate {
            background: linear-gradient(135deg, #d9d9d9, #f2f2f2);
            border: none;
            color: #000;
            font-weight: 600;
            padding: 12px;
            border-radius: 10px;
            transition: 0.25s ease;
            width: 100%;
        }
        .btn-generate:hover {
            background: linear-gradient(135deg, #e3e3e3, #ffffff);
            box-shadow: 0 0 12px rgba(255,255,255,0.5);
            transform: translateY(-2px);
        }
        .separator {
            text-align: center;
            margin: 20px 0;
            font-size: 14px;
            opacity: 0.6;
            position: relative;
        }
        .separator:before, .separator:after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }
        .separator:before { left: 0; }
        .separator:after { right: 0; }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #050510, #000000);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            backdrop-filter: blur(10px);
        }
        .loading-content { text-align: center; animation: fadeIn 0.5s ease-in-out; }
        .loading-gif { width: 160px; margin-bottom: 20px; }
        .loading-title { font-size: 32px; font-weight: 700; color: #ffffff; letter-spacing: 1px; }
        .loading-subtitle { font-size: 16px; color: #bfc2ff; margin-top: 6px; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content">
        <img src="static/Loading.gif" class="loading-gif" alt="Loading">
        <h1 class="loading-title">Generating MCQs...</h1>
        <p class="loading-subtitle">Please wait while AI prepares your questions</p>
    </div>
</div>

<div class="container mt-5">
    <h2 class="text-center mb-4">AI-Powered MCQ Generator</h2>

    <div id="errorBox" class="alert alert-danger mb-3" role="alert" style="display:none;"></div>

    <div class="form-box">
        <div class="mb-3">
            <label class="form-label">Enter a Website URL (optional):</label>
            <input class="form-control" type="text" id="url_input" placeholder="https://example.com/article">
        </div>

        <div class="separator">OR</div>

        <div class="mb-3">
            <label class="form-label">Upload File (PDF, DOCX, or TXT):</label>
            <input class="form-control" type="file" id="file" accept=".pdf,.docx,.txt">
        </div>

        <div class="mb-3">
            <label class="form-label">Total Number of MCQs:</label>
            <input class="form-control" type="number" id="total_questions" min="1" value="10">
        </div>

        <div class="mb-3">
            <label class="form-label">Enter Course Outcomes (COs):</label>
            <textarea class="form-control" id="co_list" rows="6"
                placeholder="CO1: Apply concepts of ML.&#10;CO2: Analyze algorithms.&#10;CO3: Use tools effectively."></textarea>
        </div>

        <button id="submitBtn" class="btn-generate" onclick="submitForm()">Generate MCQs</button>
    </div>
</div>

<script>
    // ---- SET YOUR BACKEND URL HERE ----
    const BACKEND_URL = "https://ai-powered-question-paper-generator-with-ew34.onrender.com";

    async function submitForm() {
        const urlInput = document.getElementById("url_input").value.trim();
        const fileInput = document.getElementById("file").files[0];
        const totalQuestions = document.getElementById("total_questions").value;
        const coList = document.getElementById("co_list").value.trim();
        const errorBox = document.getElementById("errorBox");
        const overlay = document.getElementById("loadingOverlay");
        const submitBtn = document.getElementById("submitBtn");

        errorBox.style.display = "none";

        if (!urlInput && !fileInput) {
            errorBox.innerText = "Please upload a file or enter a URL.";
            errorBox.style.display = "block";
            return;
        }
        if (!coList) {
            errorBox.innerText = "Please enter at least one Course Outcome.";
            errorBox.style.display = "block";
            return;
        }

        overlay.style.display = "flex";
        submitBtn.disabled = true;
        submitBtn.innerText = "Generating...";

        const formData = new FormData();
        formData.append("url_input", urlInput);
        formData.append("total_questions", totalQuestions);
        formData.append("co_list", coList);
        if (fileInput) formData.append("file", fileInput);

        try {
            const resp = await fetch(`${BACKEND_URL}/generate`, {
                method: "POST",
                body: formData,
            });

            const data = await resp.json();

            if (!resp.ok || data.error) {
                throw new Error(data.error || "Unknown error occurred.");
            }

            // Store result in sessionStorage and redirect to result page
            sessionStorage.setItem("mcqResult", JSON.stringify(data));
            window.location.href = "result.html";

        } catch (err) {
            overlay.style.display = "none";
            submitBtn.disabled = false;
            submitBtn.innerText = "Generate MCQs";
            errorBox.innerText = err.message;
            errorBox.style.display = "block";
        }
    }
</script>
</body>
</html>
